name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  test-and-lint:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      # This step only catches drift when a frontend PR is open to run it. If
      # meridiano-nestjs's main branch changes its OpenAPI spec with no
      # frontend PR in flight, nothing here notices until the next PR is
      # opened. There is no scheduled/independent drift check — that gap is
      # a known, deliberately deferred limitation (see issue #31).
      - name: Generate OpenAPI types and check for drift
        run: |
          attempt=1
          max_attempts=3
          until pnpm generate:api-types; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Failed to generate OpenAPI types after $max_attempts attempts"
              exit 1
            fi
            echo "Attempt $attempt failed, retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
            attempt=$((attempt + 1))
          done
          git diff --exit-code src/types/api.ts
